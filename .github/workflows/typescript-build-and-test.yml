name: (TSBuildTest) Build and test Typescript SDK

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
      os:
        required: true
        type: string
    secrets:
      INTEGRATION_TESTS_PROJECT_ID:
        required: true
      INTEGRATION_TESTS_CLIENT_ID:
        required: true
      INTEGRATION_TESTS_SECRET:
        required: true
      IMJS_OIDC_BROWSER_TEST_CLIENT_ID:
        required: true
      IMJS_OIDC_BROWSER_TEST_REDIRECT_URI:
        required: true
      IMJS_OIDC_BROWSER_TEST_SCOPES:
        required: true
      IMJS_TEST_REGULAR_USER_NAME:
        required: true
      IMJS_TEST_REGULAR_USER_PASSWORD:
        required: true
      IMJS_TEST_MANAGER_USER_NAME:
        required: true
      IMJS_TEST_MANAGER_USER_PASSWORD:
        required: true

jobs:
  build_and_test_sdk:
    runs-on: ${{ inputs.os }}
    env:
      # Isolate Playwright browser cache per OS + Node version to avoid cross-job lock contention. Fix a bug where itwin/certa post install script time out
      PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright-${{ inputs.os }}-${{ inputs.node-version }}
      
    steps:
      - name: Checkout github repo (+ download lfs dependencies)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      # Remove stale lock left by interrupted installs to prevent Playwright postinstall failures.
      - name: Cleanup stale Playwright lock
        shell: bash
        run: rm -rf "$PLAYWRIGHT_BROWSERS_PATH/__dirlock"

      - name: Install dependencies
        working-directory: ./
        # Serialize lifecycle scripts to reduce parallel postinstall conflicts (notably Playwright).
        run: pnpm install --frozen-lockfile=true --child-concurrency=1

      - name: Build
        working-directory: ./
        run: pnpm build

      - name: EsLint
        working-directory: ./
        run: pnpm lint

      - name: Run unit tests and coverage
        working-directory: ./
        run: pnpm coverage

      - name: Run SDK Integration Tests
        working-directory: ./
        env:
          IMJS_INTEGRATION_TESTS_PROJECT_ID: ${{ secrets.INTEGRATION_TESTS_PROJECT_ID }}
          IMJS_INTEGRATION_TESTS_CLIENT_ID: ${{ secrets.INTEGRATION_TESTS_CLIENT_ID }}
          IMJS_INTEGRATION_TESTS_SECRET: ${{ secrets.INTEGRATION_TESTS_SECRET }}
          IMJS_OIDC_BROWSER_TEST_CLIENT_ID: ${{ secrets.IMJS_OIDC_BROWSER_TEST_CLIENT_ID }}
          IMJS_OIDC_BROWSER_TEST_REDIRECT_URI: ${{ vars.IMJS_OIDC_BROWSER_TEST_REDIRECT_URI }}
          IMJS_OIDC_BROWSER_TEST_SCOPES: ${{ vars.IMJS_OIDC_BROWSER_TEST_SCOPES }}
          IMJS_TEST_REGULAR_USER_NAME: ${{ vars.IMJS_TEST_REGULAR_USER_NAME }}
          IMJS_TEST_REGULAR_USER_PASSWORD: ${{ secrets.IMJS_TEST_REGULAR_USER_PASSWORD }}
          IMJS_TEST_MANAGER_USER_NAME: ${{ vars.IMJS_TEST_MANAGER_USER_NAME }}
          IMJS_TEST_MANAGER_USER_PASSWORD: ${{ secrets.IMJS_TEST_MANAGER_USER_PASSWORD }}
        run: pnpm integration-tests