name: (RCRelease) Publish reality-capture Release

on: workflow_dispatch

jobs:
  build_and_test_sdk:
    strategy:
      matrix:
        node-version: [22.x, 24.15.0]
        os: [windows-latest, ubuntu-latest, macos-latest]
      fail-fast: false

    uses: ./.github/workflows/reality-capture-build-and-test.yml
    with:
      node-version: ${{ matrix.node-version }}
      os: ${{ matrix.os }}

  publish_release:
    needs: build_and_test_sdk
    uses: ./.github/workflows/reality-capture-pack-and-publish.yml
    with:
      prerelease: false
