name: (RDCBuildTest) Build and test reality-data-client

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
      os:
        required: true
        type: string
    secrets:
      INTEGRATION_TESTS_PROJECT_ID:
        required: true
      INTEGRATION_TESTS_CLIENT_ID:
        required: true
      INTEGRATION_TESTS_SECRET:
        required: true
      IMJS_OIDC_BROWSER_TEST_CLIENT_ID:
        required: true
      IMJS_OIDC_BROWSER_TEST_REDIRECT_URI:
        required: true
      IMJS_OIDC_BROWSER_TEST_SCOPES:
        required: true
      IMJS_TEST_REGULAR_USER_NAME:
        required: true
      IMJS_TEST_REGULAR_USER_PASSWORD:
        required: true
      IMJS_TEST_MANAGER_USER_NAME:
        required: true
      IMJS_TEST_MANAGER_USER_PASSWORD:
        required: true

jobs:
  build_and_test_sdk:
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout github repo (+ download lfs dependencies)
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ./typescript/packages/reality-data-client
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers-${{ inputs.node-version }}
        run: pnpm install --frozen-lockfile=true --ignore-scripts

      - name: Build
        working-directory: ./typescript/packages/reality-data-client
        run: pnpm build

      - name: EsLint
        working-directory: ./typescript/packages/reality-data-client
        run: pnpm lint

      # Two different Playwright versions live in the dependency tree, each needing a
      # DIFFERENT chromium build, so both must be installed:
      #   - @itwin/oidc-signin-tool drives the OIDC browser via @playwright/test (1.48.2) -> chromium build 1140
      #   - @itwin/certa runs the test runner via playwright (1.56.1) -> chromium_headless_shell build 1194
      #
      # `npx playwright@<version>` is unreliable here: npx runs the locally-linked `playwright`
      # bin (which is @playwright/test 1.48.2) regardless of the requested version, so the 1.56.1
      # headless shell never gets installed. Instead we resolve each tool's REAL playwright CLI via
      # Node module resolution (starting from the package that actually uses it) and run that exact
      # binary. This stays correct even if pnpm's layout or the pinned versions change.
      - name: Install Chromium for Playwright
        working-directory: ./typescript/packages/reality-data-client
        shell: bash
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers-${{ inputs.node-version }}
        run: |
          set -e
          install_chromium() {
            node -e '
              const path = require("path");
              const { execFileSync } = require("child_process");
              const consumer = process.argv[1];
              const pkg = process.argv[2];
              const pj = require.resolve(pkg + "/package.json", { paths: [require.resolve(consumer + "/package.json")] });
              const cli = path.join(path.dirname(pj), require(pj).bin.playwright);
              console.log("Installing chromium via " + pkg + " (" + require(pj).version + ") resolved from " + consumer);
              execFileSync(process.execPath, [cli, "install", "chromium"], { stdio: "inherit" });
            ' "$1" "$2"
          }
          install_chromium @itwin/oidc-signin-tool @playwright/test
          install_chromium @itwin/certa playwright

      - name: Run SDK Integration Tests
        working-directory: ./typescript/packages/reality-data-client
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers-${{ inputs.node-version }}
          # Needed on Windows: oidc-signin-tool only adds --no-sandbox on Linux; --disable-gpu prevents Chromium from hanging on Windows Server runners.
          # Note: the env var name has a typo in the tool source ("ODIC" instead of "OIDC") — use it as-is.
          ODIC_SIGNIN_TOOL_EXTRA_LAUNCH_OPTS: ${{ runner.os == 'Windows' && '{"args":["--disable-gpu"]}' || '' }}
          IMJS_INTEGRATION_TESTS_PROJECT_ID: ${{ secrets.INTEGRATION_TESTS_PROJECT_ID }}
          IMJS_INTEGRATION_TESTS_CLIENT_ID: ${{ secrets.INTEGRATION_TESTS_CLIENT_ID }}
          IMJS_INTEGRATION_TESTS_SECRET: ${{ secrets.INTEGRATION_TESTS_SECRET }}
          IMJS_OIDC_BROWSER_TEST_CLIENT_ID: ${{ secrets.IMJS_OIDC_BROWSER_TEST_CLIENT_ID }}
          IMJS_OIDC_BROWSER_TEST_REDIRECT_URI: ${{ vars.IMJS_OIDC_BROWSER_TEST_REDIRECT_URI }}
          IMJS_OIDC_BROWSER_TEST_SCOPES: ${{ vars.IMJS_OIDC_BROWSER_TEST_SCOPES }}
          IMJS_TEST_REGULAR_USER_NAME: ${{ vars.IMJS_TEST_REGULAR_USER_NAME }}
          IMJS_TEST_REGULAR_USER_PASSWORD: ${{ secrets.IMJS_TEST_REGULAR_USER_PASSWORD }}
          IMJS_TEST_MANAGER_USER_NAME: ${{ vars.IMJS_TEST_MANAGER_USER_NAME }}
          IMJS_TEST_MANAGER_USER_PASSWORD: ${{ secrets.IMJS_TEST_MANAGER_USER_PASSWORD }}
        run: pnpm test:integration
