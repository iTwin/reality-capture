name: (RDCBuildTest) Build and test reality-data-client

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
      os:
        required: true
        type: string
    secrets:
      INTEGRATION_TESTS_PROJECT_ID:
        required: true
      INTEGRATION_TESTS_CLIENT_ID:
        required: true
      INTEGRATION_TESTS_SECRET:
        required: true
      IMJS_OIDC_BROWSER_TEST_CLIENT_ID:
        required: true
      IMJS_OIDC_BROWSER_TEST_REDIRECT_URI:
        required: true
      IMJS_OIDC_BROWSER_TEST_SCOPES:
        required: true
      IMJS_TEST_REGULAR_USER_NAME:
        required: true
      IMJS_TEST_REGULAR_USER_PASSWORD:
        required: true
      IMJS_TEST_MANAGER_USER_NAME:
        required: true
      IMJS_TEST_MANAGER_USER_PASSWORD:
        required: true

jobs:
  build_and_test_sdk:
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout github repo (+ download lfs dependencies)
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ./typescript/packages/reality-data-client
        run: pnpm install --frozen-lockfile=true --ignore-scripts

      - name: Build
        working-directory: ./typescript/packages/reality-data-client
        run: pnpm build

      - name: EsLint
        working-directory: ./typescript/packages/reality-data-client
        run: pnpm lint

      - name: Install Playwright for integration tests
        working-directory: ./typescript/packages/reality-data-client
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers
        run: pnpm exec playwright install

      - name: Run SDK Integration Tests
        working-directory: ./typescript/packages/reality-data-client
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers
          IMJS_INTEGRATION_TESTS_PROJECT_ID: ${{ secrets.INTEGRATION_TESTS_PROJECT_ID }}
          IMJS_INTEGRATION_TESTS_CLIENT_ID: ${{ secrets.INTEGRATION_TESTS_CLIENT_ID }}
          IMJS_INTEGRATION_TESTS_SECRET: ${{ secrets.INTEGRATION_TESTS_SECRET }}
          IMJS_OIDC_BROWSER_TEST_CLIENT_ID: ${{ secrets.IMJS_OIDC_BROWSER_TEST_CLIENT_ID }}
          IMJS_OIDC_BROWSER_TEST_REDIRECT_URI: ${{ vars.IMJS_OIDC_BROWSER_TEST_REDIRECT_URI }}
          IMJS_OIDC_BROWSER_TEST_SCOPES: ${{ vars.IMJS_OIDC_BROWSER_TEST_SCOPES }}
          IMJS_TEST_REGULAR_USER_NAME: ${{ vars.IMJS_TEST_REGULAR_USER_NAME }}
          IMJS_TEST_REGULAR_USER_PASSWORD: ${{ secrets.IMJS_TEST_REGULAR_USER_PASSWORD }}
          IMJS_TEST_MANAGER_USER_NAME: ${{ vars.IMJS_TEST_MANAGER_USER_NAME }}
          IMJS_TEST_MANAGER_USER_PASSWORD: ${{ secrets.IMJS_TEST_MANAGER_USER_PASSWORD }}
        run: pnpm test:integration
