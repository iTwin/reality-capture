name: (TSCI) Typescript SDK CI

on:
  push:
    paths:
      - "typescript/**"
    branches: ["main"]
  pull_request:
    paths:
      - "typescript/**"
    branches: ["main"]
  workflow_dispatch:

jobs:
  build_and_test_reality_capture:
    strategy:
      matrix:
        node-version: [22.x, 24.x, 26.x]
        os: [windows-latest, ubuntu-latest, macos-latest]
      fail-fast: false

    uses: ./.github/workflows/reality-capture-build-and-test.yml
    with:
      node-version: ${{ matrix.node-version }}
      os: ${{ matrix.os }}
